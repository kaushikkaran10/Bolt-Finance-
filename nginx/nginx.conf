# =============================================
# NovaX — Nginx Reverse Proxy Configuration
# Rate limiting, WebSocket support, API routing
# =============================================

events {
    worker_connections 1024;
}

http {
    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Upstream backend
    upstream novax_backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Gzip compression
        gzip on;
        gzip_types application/json text/plain text/css application/javascript;
        gzip_min_length 1000;

        # --- API Routes ---
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://novax_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings for ML endpoints
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # --- Auth Routes (stricter rate limit) ---
        location /api/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://novax_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --- SSE Streaming (chat) ---
        location /api/chat/message/stream {
            proxy_pass http://novax_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # --- WebSocket (community) ---
        location /ws/ {
            proxy_pass http://novax_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
        }

        # --- Health Check ---
        location /health {
            proxy_pass http://novax_backend;
        }

        # --- Metrics (Prometheus) ---
        location /metrics {
            proxy_pass http://novax_backend;
            # Restrict to internal/monitoring IPs in production
            # allow 10.0.0.0/8;
            # deny all;
        }

        # --- Docs ---
        location /docs {
            proxy_pass http://novax_backend;
        }
        location /openapi.json {
            proxy_pass http://novax_backend;
        }
    }
}
