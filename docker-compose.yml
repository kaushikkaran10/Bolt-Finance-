# =============================================
# NovaX — Docker Compose Configuration
# Services: Backend, Celery, PostgreSQL, Redis,
#           MongoDB, Nginx
# =============================================

version: "3.9"

services:
  # --- FastAPI Backend ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novax-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/ml/weights:/app/ml/weights
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_started
    networks:
      - novax-network

  # --- Celery Worker ---
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.ml
    container_name: novax-celery-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: celery -A tasks worker --loglevel=info --concurrency=2
    volumes:
      - ./backend/ml/weights:/app/ml/weights
    depends_on:
      - backend
      - redis
    networks:
      - novax-network

  # --- Celery Beat Scheduler ---
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.ml
    container_name: novax-celery-beat
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command: celery -A tasks beat --loglevel=info
    depends_on:
      - redis
    networks:
      - novax-network

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: novax-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: novax
      POSTGRES_PASSWORD: novax_secret
      POSTGRES_DB: novax_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novax -d novax_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novax-network

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: novax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - novax-network

  # --- MongoDB ---
  mongo:
    image: mongo:7
    container_name: novax-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: novax_news
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - novax-network

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: novax-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - novax-network

volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  novax-network:
    driver: bridge
